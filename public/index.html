<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmRentals — Login</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-farm">Farm</span><span class="logo-rentals">Rentals</span>
    </div>
    <p class="auth-tagline">Rent smarter. Farm better.</p>

    <div id="login-section">
      <h2 class="auth-heading">Welcome Back</h2>
      <form class="auth-form">
        <div class="form-group">
          <label class="form-label" for="login-phone">Phone Number</label>
          <input type="tel" id="login-phone" placeholder="e.g. 9876543210" class="input-field">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" class="input-field">
        </div>
        <button type="submit" class="btn-primary">Log In</button>
      </form>
      <div class="auth-divider">OR</div>
      <p class="auth-footer-link">New farmer? <a href="#">Create an account</a></p>
    </div>

    <div id="register-section" style="display:none">
      <h2 class="auth-heading">Create Account</h2>
      <form class="auth-form">
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Enter your full name" class="input-field">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-phone">Phone Number</label>
          <input type="tel" id="reg-phone" placeholder="e.g. 9876543210" class="input-field">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Create a password" class="input-field">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Confirm your password" class="input-field">
        </div>
        <button type="submit" class="btn-primary">Create My Account</button>
      </form>
      <p class="auth-footer-link">Already have an account? <a href="#">Log In</a></p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
